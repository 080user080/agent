name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Права за замовчуванням — тільки read (GitHub Actions hardening)
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .
        continue-on-error: true  # поки не прийняли форматер — лише інформативно

  tests:
    name: Tests (pytest, Linux)
    runs-on: ubuntu-latest
    # Linux-прогін: win32*/pyautogui/pyperclip/mss/pytesseract/easyocr/sounddevice
    # підміняються auto-mock заглушками з tests/conftest.py.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core + dev deps (без GUI/audio/ML)
        run: |
          python -m pip install --upgrade pip
          # Ставимо лише легкі залежності, що реально потрібні для тестів.
          # Тяжкі пакети (torch, transformers, accelerate, pyautogui, pywin32)
          # не встановлюємо — вони замокані у tests/conftest.py.
          pip install pytest pytest-cov numpy Pillow opencv-python requests colorama

      - name: Run pytest
        run: pytest --cov=functions --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
